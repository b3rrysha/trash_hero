<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Your Points</title>
        <link rel="stylesheet" href="style2.css">
    </head>
    <body>
        <header>
            <div class="container">
            <h3 class="text">
            <h1>Your trash hero points :</h1>
            </h3>
        </div>
        </header>
        <section class="hero1">
        <div class="points-box">
            <h1>You have earned⭐</h1>
            <p class="points" id="points"></p>
            <button onclick="goBack()">⬅ Back</button>
            <script>function goBack(){window.location.href="Th.html"}</script>
            <script>let points = 150; 
            document.getElementById("points").innerText = points; 
            let count = 0;
            let target = 150;

            let interval = setInterval(() => {
            count++;
            document.getElementById("points").innerText = count;

            if(count >= target){
                clearInterval(interval);
            }
            }, 20);</script> 
            </div>
            </section>
</body>
</html>
